<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Felipe 1ADSB</title>

    <style>
        body {
            background-color: #0f172a; /* fundo mais moderno (azul escuro) */
            font-family: Arial, Helvetica, sans-serif;
            color: #e2e8f0;
            text-align: center;
        }

        h1 {
            font-size: 40px;
            margin-top: 30px;
        }

        h3 {
            font-size: 20px;
            margin-top: 20px;
        }

        input {
            padding: 10px;
            font-size: 18px;
            border-radius: 8px;
            border: none;
            outline: none;
            width: 200px;
            text-align: center;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            background-color: #22c55e;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #16a34a;
        }

        .resultado {
            font-weight: bold;
            font-size: 22px;
            margin-top: 5px;
            color: #38bdf8; /* destaque bonitinho */
        }
    </style>
</head>

<body>

    <h1>Felipe Machine</h1>

    <h3>Digite um número decimal:</h3>
    <input id="demo1" type="text" placeholder="Ex: 42">
    <br><br>

    <button onclick="converter()">Converter</button>

    <h3>Resultados:</h3>

    <p>Octal:</p>
    <div id="demo2" class="resultado"></div>

    <p>Hexadecimal:</p>
    <div id="demo3" class="resultado"></div>

    <p>Binário:</p>
    <div id="demo4" class="resultado"></div>

    <script>
        function converter() {
            var decimal = Number(demo1.value);

            demo2.innerHTML = decimal.toString(8);
            demo3.innerHTML = decimal.toString(16);
            demo4.innerHTML = decimal.toString(2);
        }
    </script>

</body>

</html>
